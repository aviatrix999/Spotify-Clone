<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Spotify - Your Favourite Music App</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav>
      <ul>
        <li class="brand">
          <img src="Spotify_icon.svg.png" alt="Spotify" />

          Spotify
        </li>

        <li>Home</li>

        <li>About</li>
      </ul>
    </nav>

    <!-- MAIN CONTAINER -->

    <div class="container">
      <div class="songList">
        <h1>Forever Favourites</h1>

        <div class="songItemContainer">
          <!-- SONG 1 -->

          <div class="songItem">
            <img src="" alt="1" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              4:41
              <i id="0" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>

          <!-- SONG 2 -->

          <div class="songItem">
            <img src="" alt="2" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              2:54
              <i id="1" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>

          <!-- SONG 3 -->

          <div class="songItem">
            <img src="" alt="3" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              4:01
              <i id="2" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>

          <!-- SONG 4 -->

          <div class="songItem">
            <img src="" alt="4" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              3:57
              <i id="3" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>

          <!-- SONG 5 -->

          <div class="songItem">
            <img src="" alt="5" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              2:34
              <i id="4" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>

          <!-- SONG 6 -->

          <div class="songItem">
            <img src="" alt="6" />

            <span class="songName"> Let Me Love You </span>

            <span class="timeStamp">
              3:05
              <i id="5" class="songItemPlay fa-solid fa-circle-play"></i>
            </span>
          </div>
        </div>
      </div>

      <div class="songBanner"></div>
    </div>

    <!-- BOTTOM PLAYER -->

    <div class="bottom">
      <input
        type="range"
        name="range"
        id="myProgressBar"
        min="0"
        max="100"
        value="0"
      />

      <div class="icons">
        <div id="previous">
          <i class="fa-solid fa-2x fa-step-backward" id="previous"></i>
        </div>

        <div id="masterPlay">
          <i class="fa-solid fa-2x fa-circle-play"></i>
        </div>

        <div id="next">
          <i class="fa-solid fa-2x fa-step-forward" id="next"></i>
        </div>
      </div>

      <div class="songInfo">
        <img id="gif" src="playing.gif" width="80px" alt="Playing GIF" />
        <span class="masterSongName"  id="masterSongName"></span>

        
      </div>
    </div>

    <!-- FONT AWESOME -->

    <script
      src="https://kit.fontawesome.com/6025ea69ac.js"
      crossorigin="anonymous"
    ></script>

    <!-- JS -->

    <script src="script.js"></script>
  </body>
</html>
